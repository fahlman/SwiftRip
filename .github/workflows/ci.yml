name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build, Analyze, and Test
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Fetch bundled tools
        id: bundled-tools
        continue-on-error: true
        run: SwiftRipTools/Scripts/fetch-swiftrip-tools.zsh

      - name: Analyze
        run: |
          if [[ "${{ steps.bundled-tools.outcome }}" == "success" ]]; then
            xcodebuild analyze -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS'
          else
            SWIFTRIP_SKIP_BUNDLED_TOOLS=1 xcodebuild analyze -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS'
          fi

      - name: Run tests
        run: |
          if [[ "${{ steps.bundled-tools.outcome }}" == "success" ]]; then
            xcodebuild test -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS'
          else
            SWIFTRIP_SKIP_BUNDLED_TOOLS=1 xcodebuild test -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS' -skip-testing:SwiftRipTests/BundleIntegrityTests
          fi

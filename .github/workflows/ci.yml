name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build, Analyze, and Test
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate repository
        run: Scripts/ci-validate-repo.zsh

      - name: Fetch bundled tools
        id: bundled-tools
        continue-on-error: true
        run: SwiftRipTools/Scripts/fetch-swiftrip-tools.zsh

      - name: Analyze
        run: |
          if [[ "${{ steps.bundled-tools.outcome }}" == "success" ]]; then
            xcodebuild analyze -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
          else
            SWIFTRIP_SKIP_BUNDLED_TOOLS=1 xcodebuild analyze -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
          fi

      - name: Run tests
        run: |
          if [[ "${{ steps.bundled-tools.outcome }}" == "success" ]]; then
            SWIFTRIP_SUPPRESS_FIRST_RUN_OUTPUT_PROMPT=1 xcodebuild test -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO -only-testing:SwiftRipTests
          else
            SWIFTRIP_SUPPRESS_FIRST_RUN_OUTPUT_PROMPT=1 SWIFTRIP_SKIP_BUNDLED_TOOLS=1 xcodebuild test -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO -only-testing:SwiftRipTests -skip-testing:SwiftRipTests/BundleIntegrityTests
          fi

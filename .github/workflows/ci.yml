name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run tests
        env:
          SWIFTRIP_SKIP_BUNDLED_TOOLS: "1"
        run: xcodebuild test -project SwiftRip.xcodeproj -scheme SwiftRip -destination 'platform=macOS' -skip-testing:SwiftRipTests/BundleIntegrityTests
